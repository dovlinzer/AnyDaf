name: Sync episode index to Supabase

on:
  schedule:
    - cron: "0 5 * * 1"   # Every Monday at 5 am UTC
  workflow_dispatch:        # Also allows manual "Run workflow" from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Sync episodes to Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOUNDCLOUD_CLIENT_ID: ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
        run: python3 daf-processor/sync_episodes.py
        # Exit codes:
        #   0 = full success
        #   1 = hard failure (Supabase write error)
        #   2 = partial success: RSS synced but SoundCloud client ID is invalid
        #       → GitHub will mark this run as FAILED and email you automatically
