name: Sync episode index to Supabase

on:
  schedule:
    - cron: "0 5 * * *"   # Every day at 5 am UTC
  workflow_dispatch:        # Also allows manual "Run workflow" from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Scrape fresh SoundCloud client ID
        id: scrape_id
        env:
          FALLBACK_CLIENT_ID: ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
        # Scrapes client_id fresh from SoundCloud's JS bundle each run.
        # Falls back to stored secret if scraping fails.
        # Output captured in steps.scrape_id.outputs.client_id
        run: |
          CLIENT_ID=$(python3 daf-processor/refresh_client_id.py --validate --fallback "$FALLBACK_CLIENT_ID")
          echo "client_id=$CLIENT_ID" >> $GITHUB_OUTPUT

      - name: Sync SoundCloud episodes to Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOUNDCLOUD_CLIENT_ID: ${{ steps.scrape_id.outputs.client_id }}
        run: python3 daf-processor/sync_episodes.py
        # Exit codes:
        #   0 = full success
        #   1 = hard failure (Supabase write error)
        #   2 = partial success: RSS synced but SoundCloud client ID is invalid
        #       → GitHub will mark this run as FAILED and email you automatically

      - name: Sync Transistor episodes to Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 daf-processor/sync_transistor_rss.py
        # Runs after SoundCloud sync so Transistor URLs overwrite SoundCloud URLs
        # for any episode that has been ported to Transistor.
